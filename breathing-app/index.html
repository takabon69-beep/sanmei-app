<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen Breathing - 呼吸を整える</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Zen Breathing</h1>
            <p id="instruction">まずは設定を選んで始めましょう</p>
        </header>

        <main>
            <div id="settings-pnl">
                <div class="setting-option">
                    <input type="radio" id="mode-minutes" name="mode" value="minutes" checked>
                    <label for="mode-minutes">時間で設定 (分)</label>
                    <input type="number" id="minutes-input" value="1" min="1" max="60">
                </div>
                <div class="or-divider">または</div>
                <div class="setting-option">
                    <input type="radio" id="mode-cycles" name="mode" value="cycles">
                    <label for="mode-cycles">回数で設定 (サイクル)</label>
                    <input type="number" id="cycles-input" value="5" min="1" max="100">
                </div>
            </div>

            <div class="circle-container" style="display: none;">
                <div id="outer-circle"></div>
                <div id="breathing-circle"></div>
                <div id="status-text">準備中...</div>
            </div>
            <div class="timer-display" style="display: none;">
                <span id="timer-seconds">10</span>s
                <div id="progress-info"></div>
            </div>
        </main>

        <footer>
            <button id="start-btn">スタート</button>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
